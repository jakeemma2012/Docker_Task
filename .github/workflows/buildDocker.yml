name: Build and Push Docker Image

# Khi nào chạy workflow
on:
  push:
    branches:
      - master   # Hoặc đổi thành branch bạn muốn theo dõi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Set up Docker Buildx (nếu cần multi-platform)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Login Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # 4. Build Docker image
    - name: Build Docker image
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
        docker build -t $IMAGE_NAME .

    # 5. Push Docker image
    - name: Push Docker image to Docker Hub
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
        docker push $IMAGE_NAME
        
    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="jakeemma2012/springboot-app"
        CONTAINER_PORT=80
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

        
